<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devolution Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #F5F4EE;
  font-family: 'Inter', -apple-system, sans-serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
  cursor: none;
}

/* Studio floor */
body::after {
  content: '';
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 20%;
  background: linear-gradient(to bottom, transparent, #E6E4DD);
  pointer-events: none;
  z-index: 0;
}

/* Progress */
.bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 1.5px;
  background: #1A1A1A;
  opacity: 0.12;
  width: 0%;
  z-index: 200;
}

/* Kinetic stage */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

/* The text container */
.kt {
  text-align: center;
  max-width: 860px;
  padding: 0 60px;
  position: relative;
}

/* Individual text beats */
.beat {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  text-align: center;
}
.beat.in  { opacity: 1; }
.beat.out { opacity: 0; transition-duration: 0.5s; }

/* SMALL EYEBROW */
.ey {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #AAAAAA;
  display: block;
  margin-bottom: 20px;
}

/* MAIN SANS TEXT */
.sans {
  font-family: 'Inter', sans-serif;
  font-size: 64px;
  font-weight: 600;
  letter-spacing: -3px;
  line-height: 1.08;
  color: #1A1A1A;
}
.sans.light { font-weight: 300; color: #777; font-size: 52px; }
.sans.xl { font-size: 80px; font-weight: 700; letter-spacing: -4px; }

/* SERIF — brand moments */
.serif {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 80px;
  font-weight: 400;
  letter-spacing: -2px;
  line-height: 1.05;
  color: #1A1A1A;
}
.serif.it { font-style: italic; }
.serif.xl { font-size: 100px; letter-spacing: -4px; }

/* BLUR SWEEP — for brand reveal */
.blur-sweep {
  animation: blurSweep 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}
@keyframes blurSweep {
  0%   { filter: blur(12px); opacity: 0; transform: translate(-50%,-50%) translateX(20px); }
  100% { filter: blur(0px);  opacity: 1; transform: translate(-50%,-50%) translateX(0); }
}

/* STAT */
.stat-num {
  font-family: 'Inter', sans-serif;
  font-size: 130px;
  font-weight: 800;
  letter-spacing: -8px;
  line-height: 1;
  color: #1A1A1A;
}
.stat-label {
  font-size: 18px;
  font-weight: 400;
  color: #AAAAAA;
  letter-spacing: 0;
  margin-top: 12px;
  display: block;
}

/* COUNTER */
.counter {
  font-family: 'Inter', sans-serif;
  font-size: 130px;
  font-weight: 800;
  letter-spacing: -8px;
  line-height: 1;
  color: #1A1A1A;
}
.counter-sub {
  font-size: 16px;
  font-weight: 400;
  color: #BBBBBB;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 14px;
  display: block;
}

/* STEP CARDS */
.cards {
  display: flex;
  gap: 1px;
  background: #D8D6D0;
  margin-top: 4px;
}
.card {
  flex: 1;
  background: #F5F4EE;
  padding: 28px 24px;
  text-align: left;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s, transform 0.6s;
}
.card.in { opacity: 1; transform: translateY(0); }
.card-n { font-size: 11px; font-weight: 500; letter-spacing: 4px; color: #CCCCCC; text-transform: uppercase; margin-bottom: 14px; }
.card-t { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: #1A1A1A; margin-bottom: 8px; line-height: 1.2; }
.card-b { font-size: 14px; font-weight: 400; color: #999; line-height: 1.6; }

/* DIVISION CARDS */
.divs {
  display: flex;
  gap: 1px;
  background: #D8D6D0;
}
.dcard {
  flex: 1;
  background: #F5F4EE;
  padding: 26px 20px;
  text-align: left;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.5s, transform 0.5s;
}
.dcard.in { opacity: 1; transform: translateY(0); }
.dcard svg { margin-bottom: 18px; opacity: 0.5; }
.dcard-n { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: #1A1A1A; margin-bottom: 6px; }
.dcard-a { font-size: 13px; font-weight: 400; color: #AAAAAA; }

/* CHAT */
.chat {
  background: #fff;
  border: 1px solid #E4E2DC;
  border-radius: 18px;
  padding: 26px 30px;
  max-width: 580px;
  width: 100%;
  box-shadow: 0 2px 30px rgba(0,0,0,0.07);
  margin: 0 auto;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.7s 0.4s, transform 0.7s 0.4s;
}
.chat.in { opacity: 1; transform: translateY(0); }
.chat-lbl {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #CCCCCC;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.chat-lbl::before { content:''; width:5px; height:5px; border-radius:50%; background:#1A1A1A; animation: bl 2s infinite; }
@keyframes bl { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
.bub {
  border-radius: 11px;
  padding: 11px 15px;
  margin-bottom: 8px;
  max-width: 82%;
  font-size: 15px;
  line-height: 1.55;
  opacity: 0;
  transition: opacity 0.5s;
}
.bub.u { background: #1A1A1A; color: #fff; font-weight: 500; margin-left: auto; }
.bub.r { background: #F2F1EC; color: #555; }
.bub.r b { color: #1A1A1A; font-weight: 600; }

/* CLOSE */
.close-block { text-align: center; }
.close-brand {
  font-family: 'Playfair Display', serif;
  font-size: 90px;
  font-weight: 400;
  letter-spacing: -4px;
  color: #1A1A1A;
  line-height: 1;
  display: block;
}
.close-url {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #AAAAAA;
  margin-top: 18px;
  display: block;
}
.close-cta {
  display: inline-block;
  margin-top: 40px;
  border: 1.5px solid #1A1A1A;
  color: #1A1A1A;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  padding: 15px 48px;
  border-radius: 100px;
  transition: background 0.2s;
  cursor: pointer;
}

.rb {
  position: fixed;
  bottom: 20px; right: 20px;
  border: 1px solid rgba(26,26,26,0.15);
  color: #AAAAAA;
  background: rgba(245,244,238,0.85);
  padding: 9px 20px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 300;
  font-family: 'Inter', Arial;
  backdrop-filter: blur(8px);
}
.rb.vis { opacity: 1; }
</style>
</head>
<body>

<div class="stage">
  <div class="kt" id="stage"></div>
</div>

<div class="bar" id="bar"></div>
<button class="rb" id="rb" onclick="go()">&#8635; Replay</button>

<script>
// ── BEAT SEQUENCE ──────────────────────────────────────────────────────────
// Each beat: { html, hold (ms), transition }
var BEATS = [

  // 1. Opening question — word by word feel via sequential lines
  { hold: 1000, html: '<span class="ey">The Problem</span>' },
  { hold: 2200, html: '<span class="sans">Most businesses</span>' },
  { hold: 2200, html: '<span class="sans">don\'t know</span>' },
  { hold: 2400, html: '<span class="sans xl">where to start<br><span style="color:#AAAAAA;font-weight:300;">with AI.</span></span>' },

  // 2. The reality stat
  { hold: 500,  html: '' },
  { hold: 2000, html: '<span class="ey">The Reality</span>' },
  { hold: 2800, html: '<span class="stat-num">9 in 10</span><span class="stat-label">businesses are not using AI at all.</span>' },

  // 3. The gap
  { hold: 500,  html: '' },
  { hold: 2600, html: '<span class="sans light">That gap is<br>costing them <em style="font-style:normal;color:#1A1A1A;font-weight:600;">everything.</em></span>' },

  // 4. The solution — serif brand moment
  { hold: 500,  html: '' },
  { hold: 1200, html: '<span class="ey">The Solution</span>' },
  { hold: 2800, html: '<span class="sans">We make AI</span>' },
  { hold: 2800, html: '<span class="sans">simple to deploy.</span>' },
  { hold: 3200, html: '<span class="serif it xl">Devolution Lab.</span>' },

  // 5. The promise
  { hold: 500,  html: '' },
  { hold: 2400, html: '<span class="sans light">No complexity.<br>No guesswork.</span>' },
  { hold: 2600, html: '<span class="sans">We build it.<br>We run it for you.</span>' },

  // 6. How it works — card reveal
  { hold: 500,  html: '' },
  { hold: 800,  html: '<span class="ey" style="display:block;margin-bottom:36px;">How It Works</span><div class="cards"><div class="card" id="c1"><div class="card-n">01</div><div class="card-t">We learn your business</div><div class="card-b">A 2-hour session. We map every workflow AI can own.</div></div><div class="card" id="c2"><div class="card-n">02</div><div class="card-t">We build your workforce</div><div class="card-b">Custom AI agents for every function in your company.</div></div><div class="card" id="c3"><div class="card-n">03</div><div class="card-t">We run it for you</div><div class="card-b">Fully managed. Results in 30 days. Yours to keep.</div></div></div>', onIn: animCards },

  // 7. What we automate — divisions
  { hold: 500,  html: '' },
  { hold: 800,  html: '<span class="ey" style="display:block;margin-bottom:28px;">What We Automate</span><div class="divs"><div class="dcard" id="d1"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><div class="dcard-n">Sales</div><div class="dcard-a">Lead gen · Pipeline · Renewals</div></div><div class="dcard" id="d2"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><div class="dcard-n">Marketing</div><div class="dcard-a">SEO · Content · Social</div></div><div class="dcard" id="d3"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg><div class="dcard-n">Operations</div><div class="dcard-a">Dispatch · Vendors · SLA</div></div><div class="dcard" id="d4"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><div class="dcard-n">Finance</div><div class="dcard-a">Invoicing · Budgets · Payroll</div></div><div class="dcard" id="d5"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><div class="dcard-n">Technology</div><div class="dcard-a">Security · Infra · Help Desk</div></div></div>', onIn: animDivs },

  // 8. Proof — chat
  { hold: 500,  html: '' },
  { hold: 800,  html: '<span class="ey" style="display:block;margin-bottom:24px;">In Practice</span><span class="sans" style="font-size:44px;display:block;margin-bottom:32px;">You run it all with a message.</span><div class="chat in" id="chatbox"><div class="chat-lbl">Your AI Workforce</div><div class="bub u" id="q1" style="opacity:0;">What needs my attention today?</div><div class="bub r" id="a1" style="opacity:0;"><b>3 items.</b> Vendor missed SLA. <b>47 new leads</b>, 12 qualified. Q2 <b>14% above plan.</b></div><div class="bub u" id="q2" style="opacity:0;">Send the board summary.</div><div class="bub r" id="a2" style="opacity:0;"><b>Done.</b> Sent. Revenue, pipeline, compliance — all green.</div></div>', onIn: animChat },

  // 9. $100B counter
  { hold: 500,  html: '' },
  { hold: 500,  html: '<span class="ey">The Opportunity</span>' },
  { hold: 800,  html: '<span class="counter" id="ctr">$0</span><span class="counter-sub">In annual savings at full scale</span>', onIn: animCounter },
  { hold: 5000, html: '<span class="counter">$100B+</span><span class="counter-sub" style="color:#888;transition:opacity 0.5s 0.5s;">That\'s the cost of not starting.</span>' },

  // 10. Close
  { hold: 600,  html: '' },
  { hold: 400,  html: '<span class="ey" style="display:block;margin-bottom:28px;">Get Started</span>', onIn: function(){ setTimeout(function(){showClose();},400); } },

];

var beatIdx = 0, beatTmr = null, curBeat = null;

function clearBeat() {
  if (curBeat) { curBeat.classList.add('out'); setTimeout(function(){ if(curBeat)curBeat.remove(); curBeat=null; }, 600); }
}

function showBeat(idx) {
  var stage = document.getElementById('stage');
  clearBeat();
  var b = BEATS[idx];
  if (!b) return;
  if (!b.html) { beatIdx=idx; return; }
  setTimeout(function(){
    var el = document.createElement('div');
    el.className = 'beat';
    el.innerHTML = b.html;
    stage.appendChild(el);
    void el.offsetWidth;
    el.classList.add('in');
    if (b.html.includes('blur-sweep')) el.classList.add('blur-sweep');
    curBeat = el;
    if (b.onIn) setTimeout(b.onIn, 200);
  }, 100);
}

function animCards() {
  ['c1','c2','c3'].forEach(function(id,i){
    setTimeout(function(){var e=document.getElementById(id);if(e)e.classList.add('in');},300+i*200);
  });
}
function animDivs() {
  ['d1','d2','d3','d4','d5'].forEach(function(id,i){
    setTimeout(function(){var e=document.getElementById(id);if(e)e.classList.add('in');},200+i*140);
  });
}
function animChat() {
  ['q1','a1','q2','a2'].forEach(function(id,i){
    setTimeout(function(){var e=document.getElementById(id);if(e)e.style.opacity='1';},300+i*1200);
  });
}
function animCounter() {
  var target=100000000000,dur=5500,start=performance.now();
  function tick(ts){
    var p=Math.min((ts-start)/dur,1),e=1-Math.pow(1-p,4),v=Math.floor(e*target);
    var t=v>=1e11?'$100B+':v>=1e9?'$'+(v/1e9).toFixed(0)+'B':v>=1e6?'$'+(v/1e6).toFixed(0)+'M':'$'+(v/1e3).toFixed(0)+'K';
    var el=document.getElementById('ctr');if(el)el.textContent=t;
    if(p<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function showClose() {
  var stage = document.getElementById('stage');
  clearBeat();
  setTimeout(function(){
    var el = document.createElement('div');
    el.className = 'beat';
    el.innerHTML = '<div class="close-block"><span class="close-brand">Devolution Lab</span><span class="close-url">devolutionlab.com</span><div class="close-cta">Start Your AI Journey</div></div>';
    stage.appendChild(el);
    void el.offsetWidth;
    el.classList.add('in');
    curBeat = el;
    document.getElementById('rb').classList.add('vis');
  }, 200);
}

function runBeat() {
  if (beatIdx >= BEATS.length) {
    clearInterval(beatTmr); beatTmr = null;
    document.getElementById('rb').classList.add('vis');
    return;
  }
  var b = BEATS[beatIdx];
  showBeat(beatIdx);
  var hold = b.hold || 2000;
  beatIdx++;
  beatTmr = setTimeout(runBeat, hold);
}

function go() {
  clearTimeout(beatTmr); beatTmr = null; beatIdx = 0;
  clearBeat();
  document.getElementById('rb').classList.remove('vis');
  document.getElementById('bar').style.width = '0%';
  var t0 = Date.now();
  var total = BEATS.reduce(function(a,b){return a+(b.hold||2000);},0) + 3000;
  (function upd(){var p=Math.min(((Date.now()-t0)/total)*100,100);document.getElementById('bar').style.width=p+'%';if(p<100)requestAnimationFrame(upd);})();
  setTimeout(runBeat, 600);
}

window.addEventListener('load', function(){ setTimeout(go, 700); });
</script>
</body>
</html>
